version: "3.9"

services:

  app:
    build: .
    container_name: otp-app

    ports:
      - "8080:8080"

    env_file:
      - .env

    depends_on:
      - redis
      - mongo

  redis:
    image: redis:latest

    container_name: otp-redis

    ports:
      - "6379:6379"

  mongo:
    image: mongo:latest

    container_name: otp-mongo

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password